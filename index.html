<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- ✅ Viewport — responsive on all devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ✅ SEO Meta -->
  <title>ArogyaPath</title>
  <meta name="description"
    content="ArogyaPath: AI-powered symptom checker and doctor appointment booking platform. Get instant health guidance and book verified doctors near you." />

  <!-- ✅ Theme Color — matches emerald brand (Android status bar + Chrome UI) -->
  <meta name="theme-color" content="#059669" />
  <meta name="msapplication-TileColor" content="#059669" />

  <!-- ✅ Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />

  <!-- ✅ Apple iOS + Android PWA Support -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ArogyaPath" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- ✅ Open Graph (Social Share Preview) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ArogyaPath" />
  <meta property="og:description" content="AI-powered symptom checker and doctor appointment booking platform." />
  <meta property="og:image" content="/pwa-512x512.png" />
</head>
